<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8" />
		<title>病毒大作战第一章----作者：梁晨曦</title>
		<link rel="stylesheet" href="css/main.css">
		<link rel="stylesheet" href="css/common.css">
		<script src="js/jquery.js"></script>
		<script src="js/main.js"></script>
	</head>
	<body>
		<div id="stage">
			<div class="bg1"></div>
			<div class="bg2"></div>
			<div class="functionBoard">
				<div class="health" id="health">
				    <div id="percent"></div>
				</div>
				<div class="healthLable">HP:</div>
				<div class="currentScore" id="currentScore"></div>
			</div>
			<div class="needle"></div>
			<!-- <div class="virus virus1"></div>
			<div class="virus virus2"></div>
			<div class="virus virus3"></div> -->
			<!-- <div class="water"></div> -->
			<div class="startGame">
				<button id="startBtn"></button>
				<button id="helpBtn"></button>
			</div>
			<audio id="bgmp3" src="music/backgroundMusic.mp3" loop="true"></audio>
			<audio id="sp1mp3" src="music/spray.mp3"></audio>
			<audio id="sp2mp3" src="music/sprayTwice.mp3"></audio>
			<audio id="wou1mp3" src="music/wounded1.mp3"></audio>
			<audio id="wou2mp3" src="music/wounded2.mp3"></audio>
			<div class="gameScore">
				<div class="overfant"></div>
				<div class="playerHealth"></div>
				<div class="defeated"></div>
				<div class="omissive"></div>
				<div class="finallyScore"></div>
				<table>
					<tbody id="scoreTable">
						<tr>
							<td>生命</td>
							<td>击败病毒</td>
							<td>遗漏病毒</td>
							<td>得分</td>
						</tr>
					</tbody>
				</table>
				<button id="replayBtn" type="button"></button>
				<button id="next" type="button"></button>
				<button id="returnHome"></button>
			</div>
			<div class="helpUI">
				<button id="directStart"></button>
				<button id= "home"></button>
				<button id="nextpage"></button>
			</div>
		</div>
	</body>
</html>
